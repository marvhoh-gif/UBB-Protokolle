const KEY='ubb_html_app_04';
// Zentrale Fotomaße für das Word-Protokoll (einmalig definiert, an mehreren Stellen genutzt).
const PHOTO_MAX_W_CM=6.43;   // maximale Bildbreite im DOC
const PHOTO_MAX_H_CM=8.56;   // maximale Bildhöhe im DOC
const CM_TO_PX=37.7952755906; // Umrechnung cm -> px bei 96 DPI
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
function defaultState(){return {company:{name:'',address:'',phone:'',email:'',website:'',open:true},employees:[],projects:[],inspections:[],settings:{apiKey:'',apiKeySaved:false,model:'gpt-4o-mini'},activeInspectionId:null};}
let state=defaultState();
function normalizeState(){
  if(state.company && state.company.open===undefined) state.company.open = !state.company.name;
  if(state.settings && state.settings.apiKeySaved===undefined) state.settings.apiKeySaved = !!state.settings.apiKey;
}
let page='home';
let flashTarget={};

// ============================================================
// Speicher: IndexedDB (großer Speicher für Fotos) mit
// automatischer einmaliger Übernahme alter localStorage-Daten.
// Die App arbeitet weiter synchron mit `state`; save() schreibt
// sofort in den Speicher (asynchron im Hintergrund, ohne zu warten).
// ============================================================
const IDB_NAME='ubb_app_db';
const IDB_STORE='kv';
let _idb=null;

function idbOpen(){
  return new Promise((resolve,reject)=>{
    try{
      const req=indexedDB.open(IDB_NAME,1);
      req.onupgradeneeded=()=>{ const db=req.result; if(!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE); };
      req.onsuccess=()=>resolve(req.result);
      req.onerror=()=>reject(req.error);
    }catch(e){reject(e);}
  });
}
function idbGet(key){
  return new Promise((resolve,reject)=>{
    if(!_idb){resolve(null);return;}
    try{
      const tx=_idb.transaction(IDB_STORE,'readonly');
      const r=tx.objectStore(IDB_STORE).get(key);
      r.onsuccess=()=>resolve(r.result??null);
      r.onerror=()=>reject(r.error);
    }catch(e){reject(e);}
  });
}
function idbSet(key,val){
  return new Promise((resolve,reject)=>{
    if(!_idb){resolve(false);return;}
    try{
      const tx=_idb.transaction(IDB_STORE,'readwrite');
      tx.objectStore(IDB_STORE).put(val,key);
      tx.oncomplete=()=>resolve(true);
      tx.onerror=()=>reject(tx.error);
    }catch(e){reject(e);}
  });
}

let storageWarningShown=false;
let _saveQueued=false;
// Schreibt den aktuellen state in IndexedDB. Wird von save() angestoßen.
async function persistState(){
  _saveQueued=false;
  try{
    if(_idb){ await idbSet(KEY, state); return true; }
    // Fallback, falls IndexedDB nicht verfügbar ist: localStorage versuchen.
    localStorage.setItem(KEY, JSON.stringify(state));
    return true;
  }catch(e){
    console.error('Speichern fehlgeschlagen:', e);
    if(!storageWarningShown){
      storageWarningShown=true;
      alert('Die Daten konnten auf diesem Gerät nicht vollständig gespeichert werden. Bitte ggf. sehr große/alte Fotos entfernen oder die GitHub-Datensicherung nutzen.');
    }
    return false;
  }
}
// Synchron aufrufbar wie bisher; stößt das Speichern im Hintergrund an.
function save(){
  if(!_saveQueued){ _saveQueued=true; Promise.resolve().then(persistState); }
  return true;
}
function saveNow(msg='✅ Gespeichert.'){save(); toast(msg)}
function saveArea(key,msg){save(); flashTarget[key]=msg; render(); setTimeout(()=>{delete flashTarget[key]; render()},2200)}
function toast(msg){const d=document.createElement('div');d.className='success';d.textContent=msg;document.querySelector('.wrap').prepend(d);setTimeout(()=>d.remove(),1800)}
function esc(s){return (s||'').toString().replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function escAttr(s){return esc(s).replace(/\"/g,'&quot;').replace(/'/g,'&#39;')}
function byId(arr,id){return arr.find(x=>x.id===id)}
function nav(){const tabs=[['home','Start'],['company','Büro'],['dataServer','Daten/Server'],['projects','Projekte'],['inspections','Begehungen']];document.getElementById('tabs').innerHTML=tabs.map(t=>`<button class="${page===t[0]?'active':''}" onclick="page='${t[0]}';render()">${t[1]}</button>`).join('')}
function render(){save();nav();({home,company,dataServer,projects,inspections}[page]||home)()}

async function addNewInspectionCameraPhotos(input){
  const files=input && input.files ? Array.from(input.files) : [];
  if(!files.length) return;
  for(let idx=0; idx<files.length; idx++){
    tempInspectionPhotos.push({name:files[idx].name||('foto_'+Date.now()+'.jpg'),data:await fileToData(files[idx]),caption:''});
  }
  input.value=''; // Feld leeren, damit die nächste Aufnahme möglich ist
  renderNewCameraPreview();
  toast('✅ Foto hinzugefügt');
}

function weatherTextFromCode(code){
  const c=Number(code);
  if(c===0) return 'wolkenlos';
  if([1,2].includes(c)) return 'leicht bewölkt';
  if(c===3) return 'bedeckt';
  if([45,48].includes(c)) return 'neblig';
  if([51,53,55,56,57].includes(c)) return 'Nieselregen';
  if([61,63,65,66,67,80,81,82].includes(c)) return 'regnerisch';
  if([71,73,75,77,85,86].includes(c)) return 'Schneefall';
  if([95,96,99].includes(c)) return 'Gewitter';
  return 'wechselhaft';
}
function setWeatherFeedback(msg, ok=true){const el=document.getElementById('weatherFeedback'); if(el){el.textContent=msg; el.style.color=ok?'#2d7a36':'#9a3b00';}}
async function autoWeather(){ return autoWeatherFor('newWeather','weatherFeedback'); }
async function autoWeatherFor(inputId, feedbackId){
  const weatherInput=document.getElementById(inputId);
  const oldFeedback=document.getElementById('weatherFeedback');
  if(!weatherInput) return;
  const setFb=(msg,ok=true)=>{const el=document.getElementById(feedbackId); if(el){el.textContent=msg; el.style.color=ok?'#2d7a36':'#9a3b00';} else setWeatherFeedback(msg,ok)};
  if(!navigator.geolocation){setFb('⚠ Standortdaten werden von diesem Gerät/Browser nicht unterstützt.', false); return;}
  weatherInput.placeholder='Witterung wird ermittelt...';
  setFb('Standort wird abgefragt...');
  navigator.geolocation.getCurrentPosition(async pos=>{
    try{
      const lat=pos.coords.latitude.toFixed(5), lon=pos.coords.longitude.toFixed(5);
      setFb('Wetterdaten werden geladen...');
      const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,precipitation,weather_code,wind_speed_10m&timezone=auto`;
      const r=await fetch(url);
      if(!r.ok) throw new Error('Wetterdienst nicht erreichbar');
      const data=await r.json();
      const cur=data.current||{};
      const temp=cur.temperature_2m;
      const wind=cur.wind_speed_10m;
      const precip=Number(cur.precipitation||0);
      const condition=weatherTextFromCode(cur.weather_code);
      const rain=precip>0 ? `Niederschlag ${precip} mm` : 'trocken';
      const parts=[];
      if(temp!==undefined) parts.push(`${Math.round(temp)} °C`);
      parts.push(condition);
      parts.push(rain);
      if(wind!==undefined) parts.push(`Wind ${Math.round(wind)} km/h`);
      weatherInput.value=parts.join(', ');
      setFb('✅ Witterung automatisch erfasst');
    }catch(e){setFb('⚠ Witterung konnte nicht automatisch geladen werden. Bitte manuell eintragen.', false);}
  }, err=>{
    setFb('⚠ Standortfreigabe nicht erteilt oder nicht verfügbar. Bitte Witterung manuell eintragen.', false);
  }, {enableHighAccuracy:false, timeout:10000, maximumAge:300000});
}

function readFileAsDataURL(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>resolve(r.result);
    r.onerror=()=>reject(new Error('Datei konnte nicht gelesen werden.'));
    r.readAsDataURL(file);
  });
}
async function fileToData(file){
  const original=await readFileAsDataURL(file);
  if(!file || !String(file.type||'').startsWith('image/')) return original;
  try{
    const img=await new Promise((resolve,reject)=>{
      const image=new Image();
      image.onload=()=>resolve(image);
      image.onerror=()=>reject(new Error('Bild konnte nicht geladen werden.'));
      image.src=original;
    });
    const w=img.naturalWidth||img.width;
    const h=img.naturalHeight||img.height;
    if(!w || !h) return original;
    const maxEdge=1600;
    const scale=Math.min(1, maxEdge/Math.max(w,h));
    const canvas=document.createElement('canvas');
    canvas.width=Math.max(1, Math.round(w*scale));
    canvas.height=Math.max(1, Math.round(h*scale));
    const ctx=canvas.getContext('2d');
    if(!ctx) return original;
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    const compressed=await new Promise(resolve=>{
      if(canvas.toBlob){
        canvas.toBlob(blob=>{
          if(!blob){resolve(null);return;}
          const r=new FileReader();
          r.onload=()=>resolve(r.result);
          r.onerror=()=>resolve(null);
          r.readAsDataURL(blob);
        },'image/jpeg',0.82);
      }else{
        try{resolve(canvas.toDataURL('image/jpeg',0.82));}catch(e){resolve(null);}
      }
    });
    return compressed || original;
  }catch(e){
    console.warn('Bildkomprimierung fehlgeschlagen, nutze Original:', e);
    return original;
  }
}
// Skaliert ein einzelnes Foto so herunter, dass es exakt in die Protokoll-Box
// (max. 10,5 x 5,2 cm bei 96 DPI) passt, und erzeugt es per Canvas neu. Das neu
// kodierte JPEG hat keine DPI-Metadaten mehr und wird von Word in seiner nativen
// (= korrekten) Pixelgröße eingefügt. Dadurch sind alle Bilder im DOC gleich groß,
// unabhängig von Kamera, Quelle oder ursprünglicher DPI-Angabe.
async function normalizePhotoForDoc(dataUrl){
  const maxW=Math.round(PHOTO_MAX_W_CM*CM_TO_PX);
  const maxH=Math.round(PHOTO_MAX_H_CM*CM_TO_PX);
  try{
    const img=await new Promise((res,rej)=>{const im=new Image();im.onload=()=>res(im);im.onerror=()=>rej(new Error('Bild konnte nicht geladen werden.'));im.src=dataUrl;});
    const w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
    if(!w||!h) return dataUrl;
    const scale=Math.min(maxW/w, maxH/h, 1);
    const tw=Math.max(1,Math.round(w*scale)), th=Math.max(1,Math.round(h*scale));
    const canvas=document.createElement('canvas');
    canvas.width=tw; canvas.height=th;
    const ctx=canvas.getContext('2d');
    if(!ctx) return dataUrl;
    ctx.drawImage(img,0,0,tw,th);
    try{return canvas.toDataURL('image/jpeg',0.82);}catch(e){return dataUrl;}
  }catch(e){console.warn('Foto-Normierung fehlgeschlagen, nutze Original:',e);return dataUrl;}
}

// Erzeugt eine Kopie der Begehung, in der alle Fotos auf DOC-Zielgröße normiert sind.
// Die Originaldaten im state bleiben unverändert (volle Qualität in der App).
async function inspectionWithNormalizedPhotos(i){
  const clone=JSON.parse(JSON.stringify(i));
  if(Array.isArray(clone.photos)){
    for(const ph of clone.photos){ if(ph&&ph.data) ph.data=await normalizePhotoForDoc(ph.data); }
  }
  if(Array.isArray(clone.findings)){
    for(const f of clone.findings){
      if(f&&Array.isArray(f.photos)){
        for(const ph of f.photos){ if(ph&&ph.data) ph.data=await normalizePhotoForDoc(ph.data); }
      }
    }
  }
  return clone;
}

function protocolHtml(i,p,ai){

      return '<tr><td>'+c(d.name)+'</td><td>'+c(d.company)+'</td><td>'+c(d.role)+'</td></tr>';
    })
    .join('');

  // Ziel der Fotodokumentation im Word-kompatiblen DOC:
  // Bilder linksbündig, fortlaufend untereinander, unverzerrt und so skaliert,
  // dass in der Regel drei Foto-Blöcke auf eine A4-Seite passen.
  // (Maße PHOTO_MAX_W_CM/PHOTO_MAX_H_CM/CM_TO_PX sind global definiert.)

  function dataUrlBinary(dataUrl){
    const s=String(dataUrl||'');
    const comma=s.indexOf(',');
    const b64=comma>=0 ? s.slice(comma+1) : s;
    try{return atob(b64);}catch(e){return '';}
  }

  function readU16BE(bin,offset){return (bin.charCodeAt(offset)<<8) + bin.charCodeAt(offset+1);}
  function readU32BE(bin,offset){return ((bin.charCodeAt(offset)<<24)>>>0) + (bin.charCodeAt(offset+1)<<16) + (bin.charCodeAt(offset+2)<<8) + bin.charCodeAt(offset+3);}

  function getImageDimensionsFromDataUrl(dataUrl){
    const bin=dataUrlBinary(dataUrl);
    if(!bin || bin.length<24) return null;
    try{
      // PNG: Breite/Höhe stehen im IHDR-Chunk bei Byte 16/20.
      if(bin.charCodeAt(0)===0x89 && bin.slice(1,4)==='PNG'){
        return {w:readU32BE(bin,16), h:readU32BE(bin,20)};
      }
      // JPEG: SOF-Marker suchen, dort stehen Höhe/Breite.
      if(bin.charCodeAt(0)===0xFF && bin.charCodeAt(1)===0xD8){
        let offset=2;
        while(offset+9<bin.length){
          if(bin.charCodeAt(offset)!==0xFF){offset++; continue;}
          let marker=bin.charCodeAt(offset+1);
          // Padding-FF überspringen.
          while(marker===0xFF && offset+2<bin.length){offset++; marker=bin.charCodeAt(offset+1);}
          if(marker===0xD8 || marker===0xD9){offset+=2; continue;}
          const len=readU16BE(bin,offset+2);
          if(!len || len<2) break;
          const sof=(marker>=0xC0 && marker<=0xC3) || (marker>=0xC5 && marker<=0xC7) || (marker>=0xC9 && marker<=0xCB) || (marker>=0xCD && marker<=0xCF);
          if(sof && offset+8<bin.length){
            const h=readU16BE(bin,offset+5);
            const w=readU16BE(bin,offset+7);
            if(w>0 && h>0) return {w,h};
          }
          offset+=2+len;
        }
      }
    }catch(e){console.warn('Bildmaße konnten nicht gelesen werden:', e);}
    return null;
  }

  function fitImageToDocxBox(dataUrl){
    const dim=getImageDimensionsFromDataUrl(dataUrl) || {w:4,h:3};
    const ratio=dim.w/dim.h;
    let w=PHOTO_MAX_W_CM;
    let h=w/ratio;
    if(h>PHOTO_MAX_H_CM){
      h=PHOTO_MAX_H_CM;
      w=h*ratio;
    }
    if(w>PHOTO_MAX_W_CM){
      w=PHOTO_MAX_W_CM;
      h=w/ratio;
    }
    // Word/HTML-Konverter arbeiten stabiler, wenn beide Maße explizit gesetzt sind.
    return {
      wCm:Number(w.toFixed(2)),
      hCm:Number(h.toFixed(2)),
      wPx:Math.max(1,Math.round(w*CM_TO_PX)),
      hPx:Math.max(1,Math.round(h*CM_TO_PX))
    };
  }

  function cleanFigureCaption(raw,f,fi){
    let txt=String(raw||'').trim();
    txt=txt.replace(/^\s*(Abbildung|Abb\.|Bild)\s*\d+\s*[:\-–]\s*/i,'').trim();

    return txt;

  function photoBlockHtml(imageData,captionText){
    const size=fitImageToDocxBox(imageData);

    // width/height und behandelt nackte Zahlen als Pixel, rechnet diese aber je nach
    // eingebetteter DPI des Fotos unterschiedlich um -> dasselbe Foto mal korrekt,

        photos.map(ph=>{
          const rawCaption=(ai.captions||[])[captionIndex++];

        }).join('')+
      '</div>';
    }).join('');

  return `<!doctype html><html><head><meta charset='utf-8'><style>

/* ============================================================
   GitHub Upload für Protokoll-Artefakte
   Vanilla JS, kein Backend, keine externen Libraries
   Speichert aus dieser App:
   UBÜ Protokolle/<JJJJ_MM_TT>/<Projektname>/
     protokoll.doc   (Word-kompatibles HTML-Dokument)
     bilder/foto1.jpg, foto2.jpg, ...
   Das DOC ist bewusst das bisherige Word-kompatible HTML-DOC-Format.
   ============================================================ */
const GH_CONFIG_STORAGE_KEY = 'ubb_github_upload_config_v1';
const GH_APP_DATA_PATH = 'App-Daten/ubb_daten.json';

function b64utf8(str){
  return btoa(unescape(encodeURIComponent(str)));
}

function blobToB64(blob){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const result=String(reader.result||'');
      const comma=result.indexOf(',');
      if(comma<0){reject(new Error('Blob konnte nicht als DataURL gelesen werden.'));return;}
      resolve(result.slice(comma+1));
    };
    reader.onerror=()=>reject(new Error('Blob konnte nicht gelesen werden.'));
    reader.readAsDataURL(blob);
  });
}

function encodeGithubPath(path){
  return String(path).split('/').map(seg=>encodeURIComponent(seg)).join('/');
}

function dataUrlToB64(dataUrl){
  const s=String(dataUrl||'');
  const comma=s.indexOf(',');
  return comma>=0 ? s.slice(comma+1) : s;
}

function getGithubConfig(){
  try{
    const raw=localStorage.getItem(GH_CONFIG_STORAGE_KEY);
    if(!raw) return null;
    const cfg=JSON.parse(raw);
    return {ghOwner:(cfg.ghOwner||'').trim(),ghRepo:(cfg.ghRepo||'').trim(),ghToken:(cfg.ghToken||'').trim()};
  }catch(e){return null;}
}

function hasGithubConfig(){
  const cfg=getGithubConfig();
  return !!(cfg&&cfg.ghOwner&&cfg.ghRepo&&cfg.ghToken);
}

function githubConfigPanel(){
  const cfg=getGithubConfig()||{};
  const saved=hasGithubConfig();
  const savedMsg=flashTarget['github-config']
    ? `<span class="inline-success">${flashTarget['github-config']}</span>`
    : (saved ? `<span class="inline-success">✓ GitHub-Verbindung gespeichert</span>` : '');
  return `<hr style="border:0;border-top:1px solid var(--line);margin:14px 0">
    <h3>GitHub-Upload</h3>
    <p class="muted">Speichert Protokolle als <b>DOC</b> unter <b>UBÜ Protokolle/JJJJ_MM_TT/Projektname</b> und sichert die zentrale App-Datensicherung direkt in dein GitHub-Repository. Der Token wird nicht in diese Datei geschrieben, sondern nur lokal in diesem Browser gespeichert.</p>
    <div class="grid">
      <div><label>GitHub-Benutzername / Owner</label><input id="ghOwnerInput" type="text" value="${escAttr(cfg.ghOwner||'')}" placeholder="z. B. dein-github-name" autocomplete="username"></div>
      <div><label>Repository-Name</label><input id="ghRepoInput" type="text" value="${escAttr(cfg.ghRepo||'')}" placeholder="z. B. begehungsprotokolle"></div>
    </div>

    <input id="ghTokenInput" type="password" value="${escAttr(cfg.ghToken||'')}" placeholder="github_pat_..." autocomplete="off">
    <p class="muted">Der Token wird nur in diesem Browser im localStorage gespeichert. Auf dem Handy und auf dem PC musst du ihn jeweils einmal eintragen.</p>
    <div class="row">
      <button class="secondary" onclick="saveGithubConfigFromFields(event)">GitHub-Verbindung speichern</button>
      <button class="secondary" onclick="clearGithubConfig()">GitHub-Konfiguration löschen</button>
      ${savedMsg}
    </div>
    <p class="warn">Sicherheit: Der GitHub-Token gibt Schreibzugriff auf das freigegebene Repository. Nutze einen Fine-grained Personal Access Token nur für dieses eine Repository mit <b>Contents: Read and write</b>. Den Token niemals fest in eine öffentlich gehostete HTML-Datei schreiben.</p>`;
}

function saveGithubConfigFromFields(ev){
  if(ev) ev.preventDefault();
  const ghOwner=(document.getElementById('ghOwnerInput')?.value||'').trim();
  const ghRepo=(document.getElementById('ghRepoInput')?.value||'').trim();
  const ghToken=(document.getElementById('ghTokenInput')?.value||'').trim();
  if(!ghOwner || !ghRepo || !ghToken){
    toast('⚠ Bitte GitHub-Owner, Repository und Token eintragen.');
    return false;
  }
  localStorage.setItem(GH_CONFIG_STORAGE_KEY, JSON.stringify({ghOwner, ghRepo, ghToken}));
  saveArea('github-config','✅ GitHub-Verbindung gespeichert');
  return true;
}

  },50);

function clearGithubConfig(){
  localStorage.removeItem(GH_CONFIG_STORAGE_KEY);
  if(page==='dataServer') render();
  setTimeout(()=>toast('✅ GitHub-Konfiguration wurde aus diesem Browser gelöscht.'),50);
}

function explainGithubError(error){
  const msg=String(error&&error.message?error.message:error);
  const lower=msg.toLowerCase();
  if(msg.includes('401')) return 'GitHub-Fehler 401: Token ungültig oder abgelaufen. Bitte neuen Token eintragen.';
  if(msg.includes('403') && lower.includes('resource not accessible')) return 'GitHub-Fehler 403: Resource not accessible by personal access token. Vermutlich fehlt Contents: Read and write oder das Repository ist im Token nicht freigegeben.';
  if(msg.includes('403')) return 'GitHub-Fehler 403: Zugriff verweigert. Bitte Token-Berechtigungen und Repository-Freigabe prüfen.';
  if(msg.includes('404')) return 'GitHub-Fehler 404: Repository oder Pfad nicht gefunden. Bitte Owner und Repository-Namen prüfen.';
  if(msg.includes('422')) return 'GitHub-Fehler 422: Datei konnte nicht erstellt/aktualisiert werden. Oft passiert das, wenn eine vorhandene Datei ohne korrekte SHA überschrieben werden soll.';
  return msg;
}

async function githubFetch(url, options){
  const res=await fetch(url, options);
  const text=await res.text();
  if(!res.ok){
    const shortText=text.length>800 ? text.slice(0,800)+'…' : text;
    throw new Error('GitHub API Fehler '+res.status+': '+shortText);
  }
  if(!text) return null;
  try{return JSON.parse(text);}catch(e){return text;}
}

async function ghPut(path, contentB64, message){
  const cfg=getGithubConfig();
  if(!cfg||!cfg.ghOwner||!cfg.ghRepo||!cfg.ghToken) throw new Error('GitHub-Konfiguration fehlt.');
  const encodedPath=encodeGithubPath(path);
  const url='https://api.github.com/repos/'+encodeURIComponent(cfg.ghOwner)+'/'+encodeURIComponent(cfg.ghRepo)+'/contents/'+encodedPath;
  const headers={
    'Authorization':'Bearer '+cfg.ghToken,
    'Accept':'application/vnd.github+json',
    'X-GitHub-Api-Version':'2022-11-28',
    'Content-Type':'application/json'
  };
  let sha=null;
  try{
    const existing=await githubFetch(url,{method:'GET',headers});
    if(existing&&existing.sha) sha=existing.sha;
  }catch(err){
    const m=String(err&&err.message?err.message:err);
    if(!m.includes('404')) console.warn('GitHub GET vor PUT fehlgeschlagen, versuche trotzdem PUT:', err);
  }
  const body={message, content:contentB64};
  if(sha) body.sha=sha;
  return githubFetch(url,{method:'PUT',headers,body:JSON.stringify(body)});
}

function getGithubProtocolDateParts(i){
  const raw=(i&&typeof i.date==='string') ? i.date.trim() : '';
  const match=raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(match){
    return {
      year:match[1],
      month:match[2],
      day:match[3],
      date:match[1]+'-'+match[2]+'-'+match[3],
      folder:match[1]+'_'+match[2]+'_'+match[3]
    };
  }
  const now=new Date();
  const year=String(now.getFullYear());
  const month=String(now.getMonth()+1).padStart(2,'0');
  const day=String(now.getDate()).padStart(2,'0');
  return {year, month, day, date:year+'-'+month+'-'+day, folder:year+'_'+month+'_'+day};
}

function cleanGithubTitle(raw){
  let title=String(raw||'').trim();
  if(!title || /^\(.*\)$/.test(title)) title=prompt('Titel für den GitHub-Ordner eingeben:', 'Protokoll') || 'Protokoll';
  title=String(title).replace(/[\\/:*?"<>|]/g,'_').replace(/\s+/g,' ').trim();
  if(!title) title='Protokoll';
  if(title.length>80) title=title.slice(0,80).trim();
  return title;
}

function collectGithubImages(i){
  const out=[];
  (i.photos||[]).forEach((ph,idx)=>out.push({b64:dataUrlToB64(ph.data), caption:ph.caption||('Übersichtsfoto '+(idx+1))}));
  (i.findings||[]).forEach((f,fi)=>{
    (f.photos||[]).forEach((ph,pi)=>out.push({b64:dataUrlToB64(ph.data), caption:ph.caption||('Feststellung '+(fi+1)+', Foto '+(pi+1))}));
  });
  return out.filter(x=>!!x.b64);
}

// Stellt alle Fotos einer Begehung über das iOS-Teilen-Menü bereit, damit der
// Nutzer sie mit einem Tipp in die Fotomediathek sichern kann. Eine Web-App darf
// aus Sicherheitsgründen nicht selbst in die Mediathek schreiben; das Teilen-Menü
// ist der offizielle Weg. Das Teilen mehrerer Dateien wird nicht von jedem Gerät
// gleich gut unterstützt, daher mit Einzeldatei-Fallback.
function dataUrlToFile(dataUrl, filename){
  const s=String(dataUrl||'');
  const comma=s.indexOf(',');
  const meta=s.slice(0,comma);
  const b64=comma>=0 ? s.slice(comma+1) : s;
  const mime=(meta.match(/data:([^;]+)/)||[])[1] || 'image/jpeg';
  const bin=atob(b64);
  const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return new File([bytes], filename, {type:mime});
}
function collectAllPhotos(i){
  const out=[];
  (i.photos||[]).forEach((ph,ix)=>{ if(ph&&ph.data) out.push(ph.data); });
  (i.findings||[]).forEach(f=>{ (f.photos||[]).forEach(ph=>{ if(ph&&ph.data) out.push(ph.data); }); });
  return out;
}
async function sharePhotosToLibrary(iid, btn){
  const i=byId(state.inspections,iid);
  if(!i){alert('Begehung nicht gefunden.'); return;}
  const datas=collectAllPhotos(i);
  if(!datas.length){alert('Diese Begehung enthält keine Fotos.'); return;}
  const dateTag=(i.date||'').replace(/[^0-9]/g,'') || 'foto';
  const files=datas.map((d,ix)=>dataUrlToFile(d, 'Begehung_'+dateTag+'_'+(ix+1)+'.jpg'));

  // 1) Bevorzugt: mehrere Dateien auf einmal teilen, wenn das Gerät es kann.
  try{
    if(navigator.canShare && navigator.canShare({files})){
      await navigator.share({files, title:'Begehungsfotos', text:'Begehungsfotos'});
      return;
    }
  }catch(e){
    if(e && e.name==='AbortError') return; // Nutzer hat abgebrochen
    console.warn('Teilen mehrerer Dateien fehlgeschlagen, versuche einzeln:', e);
  }

  // 2) Fallback: Dateien nacheinander einzeln teilen.
  let shared=0;
  for(let ix=0; ix<files.length; ix++){
    try{
      if(navigator.canShare && navigator.canShare({files:[files[ix]]})){
        await navigator.share({files:[files[ix]], title:'Begehungsfoto'});
        shared++;
      }
    }catch(e){
      if(e && e.name==='AbortError') break;
      console.warn('Einzelfoto teilen fehlgeschlagen:', e);
    }
  }
  if(shared===0){
    alert('Das Teilen von Fotos wird auf diesem Gerät/Browser leider nicht unterstützt. Du kannst die Fotos stattdessen aus dem GitHub-Repository im Ordner „bilder“ herunterladen.');
  }
}
async function saveProtocolToGithub(iid, triggerButton){
  const button=getGithubSaveButton(triggerButton);
  try{
    const i=byId(state.inspections,iid);
    if(!i){alert('Begehung nicht gefunden.'); return;}
    const p=byId(state.projects,i.projectId)||{};
    if(!hasGithubConfig()){
      page='dataServer';
      state.activeInspectionId=null;
      render();
      setTimeout(()=>{
        document.getElementById('ghOwnerInput')?.focus();
        toast('⚠ Bitte GitHub-Owner, Repository und Token eintragen und speichern.');
      },50);
      return;
    }
    setGithubButtonState(button,'Bereite Upload vor …',true);
    const dateParts=getGithubProtocolDateParts(i);
    const title=cleanGithubTitle(p.name||'Protokoll');
    const base='UBÜ Protokolle/'+dateParts.folder+'/'+title;
    const commitBase='Protokoll speichern: '+title+' ('+dateParts.date+')';

    setGithubButtonState(button,'Erzeuge Protokoll …',true);
    const ai=await generateTexts(i,p);
    const iDoc=await inspectionWithNormalizedPhotos(i);
    const html=protocolHtml(iDoc,p,ai);
    const allImages=collectGithubImages(i);

    setGithubButtonState(button,'Speichere … DOC',true);
    const docBlob=new Blob([html],{type:'application/msword;charset=utf-8'});
    await ghPut(base+'/protokoll.doc', await blobToB64(docBlob), commitBase+' - Word-Dokument');

    for(let idx=0; idx<allImages.length; idx++){
      setGithubButtonState(button,'Speichere … Bild '+(idx+1)+'/'+allImages.length,true);
      await ghPut(base+'/bilder/foto'+(idx+1)+'.jpg', allImages[idx].b64, commitBase+' - Foto '+(idx+1));
    }

    setGithubButtonState(button,'Sichere App-Daten …',true);
    save();
    const appBackup=buildAppDataBackup();
    await ghPut(
      GH_APP_DATA_PATH,
      b64utf8(JSON.stringify(appBackup,null,2)),
      'App-Daten sichern nach Protokollupload '+new Date().toLocaleString('de-DE')
    );

    setGithubButtonState(button,'Gespeichert ✓',true);
    alert('Protokoll und App-Daten erfolgreich nach GitHub gespeichert:\n\nProtokoll:\n'+base+'\n\nApp-Daten:\n'+GH_APP_DATA_PATH);
  }catch(err){
    console.error(err);
    alert('Speichern nach GitHub fehlgeschlagen:\n\n'+explainGithubError(err));
  }finally{
    setTimeout(()=>resetGithubButton(button),900);
  }
}

function b64ToUtf8(b64){
  const bin=atob(String(b64||'').replace(/\n/g,''));
  const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

async function ghGet(path){
  const cfg=getGithubConfig();
  if(!cfg||!cfg.ghOwner||!cfg.ghRepo||!cfg.ghToken) throw new Error('GitHub-Konfiguration fehlt.');
  const encodedPath=encodeGithubPath(path);
  const url='https://api.github.com/repos/'+encodeURIComponent(cfg.ghOwner)+'/'+encodeURIComponent(cfg.ghRepo)+'/contents/'+encodedPath;
  const headers={
    'Authorization':'Bearer '+cfg.ghToken,
    'Accept':'application/vnd.github+json',
    'X-GitHub-Api-Version':'2022-11-28'
  };
  return githubFetch(url,{method:'GET',headers});
}

function setPlainButtonState(button,text,disabled){
  if(!button) return;
  if(!button.dataset.originalText) button.dataset.originalText=button.textContent||'Speichern';
  button.textContent=text;
  button.disabled=!!disabled;
}
function resetPlainButton(button){
  if(!button) return;
  button.textContent=button.dataset.originalText||'Speichern';

function buildAppDataBackup(){
  // Keine geheimen Schlüssel in die GitHub-Sicherungsdatei schreiben.
  // Fotos werden NICHT in diese zentrale Textsicherung geschrieben, da die Datei
  // sonst zu groß für die GitHub-Schnittstelle wird. Die Fotos liegen ohnehin
  // einzeln im Bilder-Ordner jedes Protokoll-Uploads und lokal in IndexedDB.
  // Die Foto-Einträge bleiben als leere Platzhalter erhalten, damit die
  // Anzahl/Struktur sichtbar bleibt; die schweren Bilddaten werden entfernt.
  const data=JSON.parse(JSON.stringify(state));
  if(data.settings){
    data.settings.apiKey='';
    data.settings.apiKeySaved=false;
  }
  const stripPhotos=arr=>{ if(Array.isArray(arr)) arr.forEach(ph=>{ if(ph) ph.data=''; }); };
  if(Array.isArray(data.inspections)){
    data.inspections.forEach(insp=>{
      stripPhotos(insp.photos);
      if(Array.isArray(insp.findings)) insp.findings.forEach(f=>stripPhotos(f.photos));
    });
  }
  return {
    backupVersion:2,
    erstellt:new Date().toISOString(),
    app:'UBB Begehungsprotokoll',
    storageKey:KEY,
    fotosEnthalten:false,
    daten:data
  };
}

async function saveAppDataToGithub(triggerButton){
  const button=triggerButton||document.getElementById('saveAppDataGithubBtn');
  try{
    save();
    if(!hasGithubConfig()){
      openGithubConfigDialog();
      setTimeout(()=>toast('⚠ Bitte GitHub-Owner, Repository und Token eintragen und speichern.'),50);
      return;
    }
    setPlainButtonState(button,'Speichere App-Daten …',true);
    const backup=buildAppDataBackup();
    const json=JSON.stringify(backup,null,2);
    await ghPut(GH_APP_DATA_PATH, b64utf8(json), 'App-Daten sichern '+new Date().toLocaleString('de-DE'));
    setPlainButtonState(button,'Gespeichert ✓',true);
    flashTarget['github-app-data']='✅ App-Daten in GitHub gespeichert';
    render();
    setTimeout(()=>{delete flashTarget['github-app-data']; if(page==='dataServer') render();},2200);
  }catch(err){
    console.error(err);
    alert('App-Daten konnten nicht nach GitHub gespeichert werden:\n\n'+explainGithubError(err));
  }finally{
    setTimeout(()=>resetPlainButton(button),900);
  }
}

async function restoreAppDataFromGithub(triggerButton){
  const button=triggerButton||document.getElementById('loadAppDataGithubBtn');
  try{
    if(!hasGithubConfig()){
      openGithubConfigDialog();
      setTimeout(()=>toast('⚠ Bitte GitHub-Owner, Repository und Token eintragen und speichern.'),50);
      return;
    }
    if(!confirm('App-Daten wirklich aus GitHub wiederherstellen?\n\nDie aktuell im Browser gespeicherten Daten werden ersetzt.')) return;
    setPlainButtonState(button,'Lade App-Daten …',true);
    const file=await ghGet(GH_APP_DATA_PATH);
    if(!file || !file.content) throw new Error('Die GitHub-Sicherungsdatei enthält keinen lesbaren Inhalt.');
    const text=b64ToUtf8(file.content);
    const parsed=JSON.parse(text);
    const restored=parsed && parsed.daten ? parsed.daten : parsed;
    if(!restored || typeof restored!=='object' || !Array.isArray(restored.projects) || !Array.isArray(restored.inspections)){
      throw new Error('Die Datei App-Daten/ubb_daten.json passt nicht zur App-Datenstruktur.');
    }
    // Die zentrale Sicherung enthält keine Fotodaten (zu groß für GitHub).
    // Damit beim Wiederherstellen auf DIESEM Gerät vorhandene lokale Fotos nicht
    // verloren gehen, werden sie aus dem aktuellen Stand anhand der IDs wieder
    // in die wiederhergestellten Daten eingesetzt, wo dort keine Fotodaten stehen.
    try{
      const oldById={};
      (state.inspections||[]).forEach(insp=>{ oldById[insp.id]=insp; });
      const mergePhotos=(newArr,oldArr)=>{
        if(!Array.isArray(newArr)||!Array.isArray(oldArr)) return;
        newArr.forEach((ph,ix)=>{ if(ph && (!ph.data || ph.data==='') && oldArr[ix] && oldArr[ix].data){ ph.data=oldArr[ix].data; } });
      };
      (restored.inspections||[]).forEach(insp=>{
        const old=oldById[insp.id]; if(!old) return;
        mergePhotos(insp.photos, old.photos);
        if(Array.isArray(insp.findings)){
          const oldF={}; (old.findings||[]).forEach(f=>{ oldF[f.id]=f; });
          insp.findings.forEach(f=>{ const of=oldF[f.id]; if(of) mergePhotos(f.photos, of.photos); });
        }
      });
    }catch(mErr){ console.warn('Foto-Zusammenführung beim Wiederherstellen übersprungen:', mErr); }
    state=restored;
    if(!state.settings) state.settings={apiKey:'',apiKeySaved:false,model:'gpt-4o-mini'};
    if(state.settings.apiKeySaved===undefined) state.settings.apiKeySaved=!!state.settings.apiKey;
    if(!state.company) state.company={name:'',address:'',phone:'',email:'',website:'',open:true};
    if(state.company.open===undefined) state.company.open=!state.company.name;
    state.activeInspectionId=null;
    page='home';
    save();
    render();
    setTimeout(()=>toast('✅ App-Daten aus GitHub wiederhergestellt.'),50);
  }catch(err){
    console.error(err);
    alert('App-Daten konnten nicht aus GitHub wiederhergestellt werden:\n\n'+explainGithubError(err));
  }finally{
    setTimeout(()=>resetPlainButton(button),900);
  }
}

async function saveToGithub(){
  if(state.activeInspectionId) return saveProtocolToGithub(state.activeInspectionId);
  alert('Bitte öffne zuerst eine Begehung und klicke dort auf „Protokoll erstellen“.');
}

function exportData(){downloadBlob(JSON.stringify(state,null,2),'ubb_daten.json','application/json')} async function importData(file){if(!file)return;state=JSON.parse(await file.text());save();render()} function downloadBlob(content,name,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function employeeCheckboxes(selected,prefix){return state.employees.map(e=>`<label class="pill"><input type="checkbox" ${selected.includes(e.id)?'checked':''} onchange="${prefix}'${e.id}')"> ${esc(e.name||'Mitarbeiter')}</label>`).join('')||'<p class="muted">Noch keine Mitarbeiter angelegt.</p>'}
function inp(label,path,type='text'){return `<label>${label}</label><input type="${type}" data-path="${path}" value="${escAttr(path.split('.').reduce((o,k)=>o?.[k],state))}">`} function ta(label,path){return `<label>${label}</label><textarea data-path="${path}">${esc(path.split('.').reduce((o,k)=>o?.[k],state))}</textarea>`} function rawInp(label,val,onchange){let type=onchange==='date'?'date':'text', oc=onchange&&onchange!=='date'?`oninput="${onchange}"`:'';return `<div><label>${label}</label><input type="${type}" value="${escAttr(val)}" ${oc}></div>`} function rawTa(label,val,onchange){let oc=onchange?`oninput="${onchange}"`:'';return `<label>${label}</label><textarea ${oc}>${esc(val)}</textarea>`}
function bindInputs(){document.querySelectorAll('[data-path]').forEach(el=>el.oninput=()=>{let parts=el.dataset.path.split('.'),o=state;while(parts.length>1)o=o[parts.shift()];o[parts[0]]=el.value;save()})}
// App-Start: zuerst IndexedDB öffnen und Daten laden, dann rendern.
async function startApp(){
  try{ _idb=await idbOpen(); }
  catch(e){ console.warn('IndexedDB nicht verfügbar, nutze localStorage:', e); _idb=null; }
  let loaded=null;
  if(_idb){
    try{ loaded=await idbGet(KEY); }catch(e){ console.warn('IDB-Laden fehlgeschlagen:', e); }
  }
  if(!loaded){
    try{
      const ls=localStorage.getItem(KEY);
      if(ls){
        loaded=JSON.parse(ls);
        if(_idb){ try{ await idbSet(KEY, loaded); }catch(e){ console.warn('Migration nach IDB fehlgeschlagen:', e); } }
      }
    }catch(e){ console.warn('localStorage-Migration fehlgeschlagen:', e); }
  }
  if(loaded && typeof loaded==='object') state=loaded;
  normalizeState();
  render();
}
startApp();
